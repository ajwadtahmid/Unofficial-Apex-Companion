name: Build Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          echo "PROXY_URL=${{ secrets.PROXY_URL }}" > .env
          echo "CLIENT_TOKEN=${{ secrets.CLIENT_TOKEN }}" >> .env

      - name: Generate env code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    needs: [test, extract-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          echo "PROXY_URL=${{ secrets.PROXY_URL }}" > .env
          echo "CLIENT_TOKEN=${{ secrets.CLIENT_TOKEN }}" >> .env

      - name: Generate env code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Set up Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/key.properties

      - name: Build Android AAB
        run: flutter build appbundle --release

      - name: Rename AAB artifact
        run: mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}-release.aab

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: unofficial-apex-companion-android
          path: build/app/outputs/bundle/release/unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}-release.aab

  build-windows:
    needs: [test, extract-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          "PROXY_URL=${{ secrets.PROXY_URL }}" | Out-File -FilePath .env -Encoding utf8
          "CLIENT_TOKEN=${{ secrets.CLIENT_TOKEN }}" | Add-Content -Path .env -Encoding utf8

      - name: Generate env code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release -v

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows Installer
        run: |
          $env:GITHUB_WORKSPACE = "${{ github.workspace }}"
          & 'C:\Program Files (x86)\NSIS\makensis.exe' "${{ github.workspace }}\windows\installer\unofficial_apex_companion.nsi"

      - name: Rename Windows installer
        run: mv unofficial-apex-companion-installer.exe "unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}-installer.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: unofficial-apex-companion-windows
          path: unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}-installer.exe

  build-linux:
    needs: [test, extract-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            pkg-config \
            cmake \
            ninja-build \
            clang \
            libcurl4-openssl-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libssl-dev \
            libsecret-1-dev \
            libsqlite3-dev \
            libsqlite3-0 \
            zsync

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from secrets
        run: |
          echo "PROXY_URL=${{ secrets.PROXY_URL }}" > .env
          echo "CLIENT_TOKEN=${{ secrets.CLIENT_TOKEN }}" >> .env

      - name: Generate env code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        run: flutter build linux --release -v

      - name: Install linuxdeploy
        run: |
          mkdir -p linuxdeploy
          cd linuxdeploy
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x *.AppImage
          cd ..
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV

      - name: Create AppImage
        run: |
          BUNDLE=build/linux/x64/release/bundle
          mkdir -p AppDir/usr/bin
          cp -r $BUNDLE/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/unofficial_apex_companion

          mkdir -p AppDir
          printf '%s\n' \
            '#!/bin/bash' \
            'APPDIR="$(cd "$(dirname "$0")" && pwd)"' \
            'export LD_LIBRARY_PATH="$APPDIR/usr/bin/lib:$LD_LIBRARY_PATH"' \
            'cd "$APPDIR/usr/bin"' \
            'exec "$APPDIR/usr/bin/unofficial_apex_companion" "$@"' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun

          mkdir -p AppDir/usr/share/applications
          printf '[Desktop Entry]\nType=Application\nName=Unofficial Apex Companion\nComment=Offline-first stats tracker for Apex Legends players\nExec=unofficial_apex_companion\nIcon=com.ajwadtahmid.unofficialapexcompanion\nCategories=Utility;Game;\nTerminal=false\n' \
            > AppDir/usr/share/applications/com.ajwadtahmid.unofficialapexcompanion.desktop

          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp assets/logos/flathub/icon_256.png \
            AppDir/usr/share/icons/hicolor/256x256/apps/com.ajwadtahmid.unofficialapexcompanion.png

          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          cp assets/logos/flathub/icon_512.png \
            AppDir/usr/share/icons/hicolor/512x512/apps/com.ajwadtahmid.unofficialapexcompanion.png

          export VERSION="${GITHUB_REF#refs/tags/v}"
          ./linuxdeploy/linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --output appimage

      - name: Rename Linux AppImage
        run: mv Unofficial_Apex_Companion-${{ needs.extract-version.outputs.version }}-x86_64.AppImage unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: unofficial-apex-companion-linux
          path: unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}.AppImage

  create-release:
    needs: [extract-version, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: unofficial-apex-companion-windows
          path: windows-build/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: unofficial-apex-companion-linux
          path: linux-build/

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: unofficial-apex-companion-android
          path: android-build/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}-installer.exe
            linux-build/unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}.AppImage
            android-build/unofficial-apex-companion-v${{ needs.extract-version.outputs.version }}-release.aab
          draft: true
          generate_release_notes: true
